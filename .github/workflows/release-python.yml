# Build Python wheels for all major platforms and optionally publish to PyPI.
#
# Trigger:  push a version tag  →  git tag v0.1.0 && git push --tags
# Publish:  set the PYPI_API_TOKEN repository secret, then uncomment the
#           "Publish to PyPI" step below.
#
# Local dev (with uv):
#   uv venv && uv pip install maturin
#   uv run maturin develop --features python
#   python -c "import xrk; s = xrk.open('session.xrk'); print(s)"

name: Release Python wheels

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create GitHub release

jobs:
  # ── Build wheels for Linux, macOS, Windows ──────────────────────────────────
  build-wheels:
    name: Wheels — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          # Linux: manylinux_2_28 — works on any modern distro (Ubuntu 18+, RHEL 8+)
          # macOS: universal2   — single wheel runs on both Intel and Apple Silicon
          # Windows: x86_64 MSVC
          manylinux: "2_28"
          target: ${{ matrix.os == 'macos-latest' && 'universal2-apple-darwin' || '' }}
          args: --release --features python --out dist/
          # Strip debug symbols from the release build to reduce wheel size
          before-script-linux: |
            yum install -y openssl-devel || apt-get install -y libssl-dev || true

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  # ── Build a source distribution (sdist) ────────────────────────────────────
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  # ── Create GitHub Release with all wheels attached ─────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # ── Publish to PyPI ─────────────────────────────────────────────────────────
  # Uncomment this job once you have set PYPI_API_TOKEN in repo secrets
  # (Settings → Secrets and variables → Actions → New repository secret)
  #
  # publish-pypi:
  #   name: Publish to PyPI
  #   needs: [build-wheels, build-sdist]
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with:
  #         pattern: wheels-*
  #         merge-multiple: true
  #         path: dist/
  #     - uses: PyO3/maturin-action@v1
  #       with:
  #         command: upload
  #         args: --non-interactive --skip-existing dist/*
  #       env:
  #         MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
